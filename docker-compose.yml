

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-condominio_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - condominio_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d condominio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./iot/mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
    networks:
      - condominio_network

  nginx-gateway:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - auth-service
      - monitoring-service
    networks:
      - condominio_network

  # === Microservices ===

  frontend:
    build: 
      context: ./frontend
    container_name: frontend
    ports:
      - "5173:80"
    networks:
      - condominio_network

  auth-service:
    build:
      context: ./backend/auth-service
    container_name: auth-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/condominio_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-admin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-admin123}
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - condominio_network

  monitoring-service:
    build:
      context: ./backend/monitoring-service
    container_name: monitoring-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/condominio_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-admin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-admin123}
    depends_on:
      postgres-db:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
    networks:
      - condominio_network

  notification-service:
    build:
      context: ./backend/notification-service
    container_name: notification-service
    environment:
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    depends_on:
      mqtt-broker:
        condition: service_started
    networks:
      - condominio_network

  vision-service:
    build:
      context: ./vision-service
    container_name: vision-service
    depends_on:
      - mqtt-broker
    networks:
      - condominio_network

  iot-service:
    build:
      context: ./iot
    container_name: iot-service
    depends_on:
      - mqtt-broker
    networks:
      - condominio_network

networks:
  condominio_network:
    driver: bridge

volumes:
  pg_data:
  mosquitto_data:
